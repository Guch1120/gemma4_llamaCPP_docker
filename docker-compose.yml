services:
  llama-gemma4:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-gemma4-e4b
    restart: unless-stopped
    ports:
      - "8080:8080"
    gpus: all
    volumes:
      - ./cache:/root/.cache
      - ./models:/models
    environment:
      HF_HOME: /root/.cache/huggingface
      HF_TOKEN: ${HF_TOKEN:-}
    command:
      [
        "-hf", "unsloth/gemma-4-E4B-it-qat-GGUF:UD-Q4_K_XL",
        "--spec-type", "draft-mtp",
        "--spec-draft-n-max", "4",
        "-ngl", "999",
        "-fa", "off",
        "--ctx-size", "8192",
        "--host", "0.0.0.0",
        "--port", "8080"
      ]

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui-llama
    restart: unless-stopped
    profiles: ["ui"]
    ports:
      - "3000:8080"
    volumes:
      - ./open-webui:/app/backend/data
    environment:
      OPENAI_API_BASE_URL: http://llama-gemma4:8080/v1
      OPENAI_API_KEY: dummy
    depends_on:
      - llama-gemma4
